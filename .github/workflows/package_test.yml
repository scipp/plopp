name: Test

on:
  workflow_dispatch:
    inputs:
      os-variant:
        default: 'ubuntu-24.04'
        type: string
      python-version:
        type: string
      tox-env:  # Unused but needed to accept input arg
        default: ''
        type: string
      checkout_ref:
        default: ''
        type: string
  workflow_call:
    inputs:
      os-variant:
        default: 'ubuntu-24.04'
        type: string
      python-version:
        type: string
      tox-env:  # Unused but needed to accept input arg
        default: ''
        type: string
      checkout_ref:
        default: ''
        type: string

jobs:
  package-test:
    runs-on: ${{ inputs.os-variant }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install .[scipp]
      - run: python tests/package_test.py
        name: Run package tests
